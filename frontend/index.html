<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD estudiantes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <h2>Nuevo estudiante</h2>
        <form id="student-form" action="">
            <input type="hidden" id="student-id" name="">
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" required minlength="2">
            </div>
            <div class="form-group">
                <label for="age">Edad</label>
                <input type="number" id="age" name="age" required min="1">
            </div>
            <div class="form-group">
                <label for="grade">Nota</label>
                <input type="number" id="grade" name="grade" required min="1" max="5">
            </div>
            <div class="form-group">
                <button type="submit" id="submit-btn" class="btn btn-primary">Guardar</button>
                <button type="button" id="cancel-btn" class="btn btn-secondary">Cancelar</button>
            </div>
        </form>
    </div>
    <div>
        <Label>Lista de Estudiantes</Label>
        <table class="table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Nota</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="student-list">

            </tbody>
        </table>
    </div>
    <script src="./index.js"></script>
</body>

</html>
