<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login OTP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <h2>Acceso con OTP</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input class="form-control" type="email" id="email" name="email" required placeholder="tu@gmail.com">
            </div>
            <button class="btn btn-primary" type="submit">Enviar código OTP</button>
        </form>

        <form id="otp-form" style="display:none; margin-top:20px;">
            <div class="form-group">
                <label for="otp">Código OTP</label>
                <input class="form-control" type="text" id="otp" name="otp" required minlength="6" maxlength="6" placeholder="123456">
            </div>
            <button class="btn btn-primary" type="submit">Verificar OTP</button>
        </form>

        <div id="message" style="margin-top:16px; color: #fff;"></div>
    </div>
    <script src="./login.js"></script>
</body>

</html>
